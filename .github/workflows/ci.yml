name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
